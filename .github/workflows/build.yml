name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build
        shell: cmd
        run: build.bat

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GroupedTaskView
          path: |
            build/GroupedTaskView.exe
            build/GroupedTaskView-Setup.exe
          if-no-files-found: error
